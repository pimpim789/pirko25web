<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/CSS/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Моє портфоліо </title>
    <style>
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body>
    <header class="header">

        <div class="logo">
            <h1>Портфоліо</h1>
        </div>

        <nav>
            <ul class="nav-list">
                <li><a href="#"> ГОЛОВНА </a></li>
                <li><a href="#"> ГАЛЕРЕЯ </a></li>
                <li><a href="#"> КОНТАКТИ </a></li>
                <li><a href="checkout.html">Форма</a></li>
            </ul>
        </nav>
    </header>
    <main>

        <h2 class="section-title">Зв'язатися зі мною</h2>

        <form class="checkout-form" action="#" method="POST">

            <fieldset>
                <legend>Особисті дані</legend>

                <div class="form-group">
                    <label for="fullName">Ім'я та прізвище:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Телефон:</label>
                    <input type="tel" id="phone" name="phone" pattern="\+380\d{9}" placeholder="+380XXXXXXXXX" required>
                </div>

            </fieldset>

            <fieldset>
                <legend>Причина звернення</legend>

                <div class="form-group">
                    <label for="topic">Тема:</label>

                    <select id="topic" name="topic">
                        <option>Співпраця</option>
                        <option>Питання по роботах</option>
                        <option>Інше</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>
                        <input type="radio" name="contact" checked>
                        Email
                    </label>

                    <label>
                        <input type="radio" name="contact">
                        Телефон
                    </label>
                </div>

            </fieldset>

            <fieldset>

                <legend>Повідомлення</legend>

                <div class="form-group">
                    <label for="message">Текст:</label>

                    <textarea id="message" name="message" rows="4"></textarea>
                </div>

                <label>
                    <input type="checkbox" required>
                    Я погоджуюсь на обробку даних
                </label>

            </fieldset>

            <button type="submit" class="btn">
                Надіслати
            </button>

        </form>

    </main>
    <footer id="footer">
        <p>FOOTER: &copy; 2026 CS-25 </p>
        <ul>
            <li> Phone: +380757010575 </li>
            <li> Email: pirkosofia@gmail.com </li>
            <li> Adress: ifols mfjols fj 24</li>
        </ul>
        <form action="">
            <label for="" email> Ваша електронна пошта </label>
            <input type="email" name="email" id="email" />
            <input type="button" value="Підписатися" />
        </form>
    </footer>
</body>

</html>
